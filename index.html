<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heist & Cooldown Dashboard</title>
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-card: #171a26;
            --bg-accent: #1e2235;
            --text-main: #f0f2f5;
            --text-muted: #8a90a6;
            --primary: #4f46e5;
            --status-inactive: #374151;
            --status-running: #0ca678;
            --status-finished: #f03e3e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 2rem; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 900px; }
        header { margin-bottom: 2rem; text-align: center; }
        header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 5rem; }
        @media (min-width: 640px) { .timer-grid { grid-template-columns: repeat(2, 1fr); } }
        .timer-card { background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s; }
        .timer-card:hover { transform: translateY(-2px); border-color: rgba(99, 102, 241, 0.4); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .timer-name { font-size: 1.1rem; font-weight: 600; }
        .status-badge { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 20px; background: var(--status-inactive); }
        .timer-card.running .status-badge { background: var(--status-running); }
        .timer-card.finished .status-badge { background: var(--status-finished); }
        .time-display { font-size: 1.75rem; font-weight: 700; font-family: monospace; margin: 0.5rem 0; }
        .card-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
        .btn-action { flex: 1; background: var(--bg-accent); border: none; color: var(--text-main); padding: 0.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-action:hover { background: var(--primary); }
        .card-footer { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.75rem; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 0.75rem; }
        .controls-dock { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: rgba(23, 26, 38, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 0.75rem 1.5rem; border-radius: 30px; display: flex; align-items: center; gap: 1.5rem; z-index: 100; }
        .btn-round { background: var(--bg-accent); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <header><h1>Heist & Cooldown Dashboard</h1></header>
        <div class="timer-grid" id="timerGrid"></div>
    </div>

    <div class="controls-dock">
        <button class="btn-round" id="addTimerBtn">+</button>
        <button class="btn-round" id="removeTimerBtn">-</button>
    </div>

    <script>
        const defaultTimers = [
            { id: "cayo", name: "Cayo", duration: 6 * 3600 },
            { id: "dch", name: "DCH", duration: 6 * 3600 },
            { id: "doomsday", name: "Doomsday", duration: 6 * 3600 },
            { id: "drugs", name: "Drugs", duration: 6 * 3600 },
            { id: "hangar", name: "Hangar", duration: 8 * 3600 },
            { id: "ceo", name: "CEO Crates", duration: 12 * 3600 },
            { id: "nightclub", name: "Nightclub", duration: 48 * 3600 },
            { id: "avi", name: "Avi", duration: 48 * 60 },
            { id: "cluckin", name: "Cluckin Bell", duration: 48 * 60 },
            { id: "oscar", name: "Oscar Guzman", duration: 48 * 60 },
            { id: "dre", name: "Dr Dre", duration: 48 * 60 }
        ];

        let timerStates = JSON.parse(localStorage.getItem('timerStates')) || {};

        function formatTime(seconds) {
            if (seconds <= 0) return "00h 00m 00s";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;
        }

        function render() {
            const grid = document.getElementById('timerGrid');
            grid.innerHTML = '';
            
            // Merge defaults with any custom timers saved
            const allTimers = [...defaultTimers];
            Object.keys(timerStates).forEach(id => {
                if (!defaultTimers.find(t => t.id === id)) {
                    allTimers.push({ id, name: timerStates[id].name, duration: timerStates[id].duration });
                }
            });

            allTimers.forEach(t => {
                const state = timerStates[t.id] || { endTimestamp: null, startedAt: 'Waiting', finishedAt: 'Waiting' };
                let remaining = t.duration;
                let status = "Inactive";

                if (state.endTimestamp) {
                    remaining = Math.ceil((state.endTimestamp - Date.now()) / 1000);
                    if (remaining > 0) {
                        status = "Running";
                    } else {
                        remaining = 0;
                        status = "Finished";
                    }
                }

                const card = document.createElement('div');
                card.className = `timer-card ${status.toLowerCase()}`;
                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <span class="timer-name">${t.name}</span>
                            <span class="status-badge">${status}</span>
                        </div>
                        <div class="time-display" id="time-${t.id}">${formatTime(remaining)}</div>
                    </div>
                    <div>
                        <div class="card-actions">
                            <button class="btn-action" onclick="toggleTimer('${t.id}', ${t.duration})">${status === 'Running' ? 'Pause' : 'Start'}</button>
                            <button class="btn-action" onclick="resetTimer('${t.id}')">Reset</button>
                        </div>
                        <div class="card-footer">
                            <span>Started: ${state.startedAt}</span>
                            <span id="fin-${t.id}">Finished: ${status === 'Finished' && state.finishedAt === 'Waiting' ? new Date(state.endTimestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : state.finishedAt}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.toggleTimer = function(id, duration) {
            if (!timerStates[id]) timerStates[id] = { name: defaultTimers.find(t=>t.id===id)?.name || "Custom", duration: duration, endTimestamp: null, startedAt: 'Waiting', finishedAt: 'Waiting' };
            
            const state = timerStates[id];
            let remaining = state.endTimestamp ? Math.ceil((state.endTimestamp - Date.now()) / 1000) : duration;

            if (state.endTimestamp && remaining > 0) {
                // Pause (Clear end time but remember remaining fraction)
                timerStates[id].duration = remaining;
                timerStates[id].endTimestamp = null;
            } else {
                // Start
                timerStates[id].endTimestamp = Date.now() + (remaining > 0 ? remaining : duration) * 1000;
                timerStates[id].startedAt = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                timerStates[id].finishedAt = "Waiting";
            }
            localStorage.setItem('timerStates', JSON.stringify(timerStates));
            render();
        }

        window.resetTimer = function(id) {
            if (timerStates[id]) {
                const orig = defaultTimers.find(t=>t.id===id);
                timerStates[id] = { name: timerStates[id].name, duration: orig ? orig.duration : timerStates[id].duration, endTimestamp: null, startedAt: 'Waiting', finishedAt: 'Waiting' };
                localStorage.setItem('timerStates', JSON.stringify(timerStates));
                render();
            }
        }

        // Background accurate ticking engine
        setInterval(() => {
            Object.keys(timerStates).forEach(id => {
                const state = timerStates[id];
                if (state.endTimestamp) {
                    const remaining = Math.ceil((state.endTimestamp - Date.now()) / 1000);
                    const displayEl = document.getElementById(`time-${id}`);
                    if (displayEl) displayEl.textContent = formatTime(remaining);
                    
                    if (remaining <= 0 && state.finishedAt === "Waiting") {
                        render(); // Force a clean UI color shift to finished layout state
                    }
                }
            });
        }, 1000);

        document.getElementById('addTimerBtn').addEventListener('click', () => {
            const name = prompt("Enter custom cooldown name:");
            const mins = prompt("Enter duration in minutes:", "60");
            if (name && mins) {
                const id = "custom_" + Date.now();
                timerStates[id] = { name, duration: parseInt(mins) * 60, endTimestamp: null, startedAt: 'Waiting', finishedAt: 'Waiting' };
                localStorage.setItem('timerStates', JSON.stringify(timerStates));
                render();
            }
        });

        document.getElementById('removeTimerBtn').addEventListener('click', () => {
            const keys = Object.keys(timerStates).filter(k => k.startsWith('custom_'));
            if (keys.length > 0) {
                delete timerStates[keys[keys.length - 1]];
                localStorage.setItem('timerStates', JSON.stringify(timerStates));
                render();
            }
        });

        render();
    </script>
</body>
</html>
